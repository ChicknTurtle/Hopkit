name: Build & Release Hopkit

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'package.json'

permissions:
  contents: read

jobs:
  check:
    name: Check version vs latest release
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_version.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if package.json version differs from latest release
        id: check_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION=$(jq -r .version package.json)
          echo "Local package.json version: $VERSION"
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest"
          STATUS=$(curl -s -o /tmp/release.json -w "%{http_code}" -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$API_URL" || echo "000")
          if [ "$STATUS" -ne 200 ]; then
            echo "No previous release found (status $STATUS)."
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          TAG=$(jq -r .tag_name /tmp/release.json)
          TAG=${TAG#v}
          echo "Latest release tag: $TAG"
          if [ "$TAG" = "$VERSION" ]; then
            echo "Version matches latest release; skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Version differs (latest: $TAG, local: $VERSION); will build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build artifacts
    needs: check
    if: ${{ needs.check.outputs.should_build == 'true' }}
    strategy:
      matrix:
        include:
          - platform: win
            runs-on: windows-latest
          - platform: mac
            runs-on: macos-latest
          - platform: linux
            runs-on: ubuntu-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build for ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}

      - name: Ensure expected output dirs exist (non-Windows)
        if: matrix.platform != 'win'
        run: |
          mkdir -p dist
          mkdir -p "dist/${{ matrix.platform }}"
          mkdir -p "build/${{ matrix.platform }}" || true

      - name: Ensure expected output dirs exist (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path dist\win | Out-Null
          New-Item -ItemType Directory -Force -Path build\win | Out-Null

      - name: Package build into zip (non-Windows)
        if: matrix.platform != 'win'
        run: |
          set -e
          if [ -d "dist/${{ matrix.platform }}" ] && [ "$(ls -A dist/${{ matrix.platform }})" ]; then
            zip -r "dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip" "dist/${{ matrix.platform }}"
          elif [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            zip -r "dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip" "dist"
          elif [ -d "build/${{ matrix.platform }}" ] && [ "$(ls -A build/${{ matrix.platform }})" ]; then
            zip -r "dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip" "build/${{ matrix.platform }}"
          elif [ -d "build" ] && [ "$(ls -A build)" ]; then
            zip -r "dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip" "build"
          else
            touch "dist/.placeholder"
            zip -r "dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip" "dist" >/dev/null
          fi

      - name: Package build into zip (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $dst = "dist\\hopkit-win-v${env:VERSION}.zip"
          $candidates = @("dist\\win","dist","build\\win","build")
          $selected = $null
          foreach ($c in $candidates) {
            if ((Test-Path $c -PathType Container) -and ((Get-ChildItem $c -Recurse | Measure-Object).Count -gt 0)) {
              $selected = $c
              break
            }
          }
          if (-not $selected) {
            New-Item -ItemType Directory -Force -Path dist | Out-Null
            New-Item -Item -Force -Path dist\\.placeholder | Out-Null
            Compress-Archive -Path "dist\\*" -DestinationPath $dst -Force
          } else {
            Compress-Archive -Path "$selected\\*" -DestinationPath $dst -Force
          }

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: hopkit-${{ matrix.platform }}
          path: dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip

  publish:
    name: Create release and upload assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ needs.check.outputs.should_build == 'true' }}
    steps:
      - name: Checkout (for version)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version (publish)
        id: get_version_publish
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: hopkit-win
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: hopkit-mac
          path: ./artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: hopkit-linux
          path: ./artifacts

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          release_name: Hopkit v${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows build to release
        if: always()
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/hopkit-win/hopkit-win-v${{ env.VERSION }}.zip
          asset_name: hopkit-win-v${{ env.VERSION }}.zip
          asset_content_type: application/zip

      - name: Upload macOS build to release
        if: always()
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/hopkit-mac/hopkit-mac-v${{ env.VERSION }}.zip
          asset_name: hopkit-mac-v${{ env.VERSION }}.zip
          asset_content_type: application/zip

      - name: Upload Linux build to release
        if: always()
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/hopkit-linux/hopkit-linux-v${{ env.VERSION }}.zip
          asset_name: hopkit-linux-v${{ env.VERSION }}.zip
          asset_content_type: application/zip
