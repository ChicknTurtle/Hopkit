name: Build & Release Hopkit

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'package.json'

permissions:
  contents: read

jobs:
  check:
    name: Check version vs latest release
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_version.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if package.json version differs from latest release
        id: check_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION=$(jq -r .version package.json)
          echo "Local package.json version: $VERSION"
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest"
          STATUS=$(curl -s -o /tmp/release.json -w "%{http_code}" -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$API_URL" || echo "000")
          if [ "$STATUS" -ne 200 ]; then
            echo "No previous release found (status $STATUS)."
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          TAG=$(jq -r .tag_name /tmp/release.json)
          TAG=${TAG#v}
          echo "Latest release tag: $TAG"
          if [ "$TAG" = "$VERSION" ]; then
            echo "Version matches latest release; skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Version differs (latest: $TAG, local: $VERSION); will build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build artifacts
    needs: check
    if: ${{ needs.check.outputs.should_build == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win
            runs-on: windows-latest
          - platform: mac
            runs-on: macos-latest
          - platform: linux
            runs-on: ubuntu-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build for ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}

      - name: Ensure expected output dirs exist (non-Windows)
        if: matrix.platform != 'win'
        run: |
          mkdir -p dist
          mkdir -p "dist/${{ matrix.platform }}"
          mkdir -p "build/${{ matrix.platform }}" || true

      - name: Ensure expected output dirs exist (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path dist\win | Out-Null
          New-Item -ItemType Directory -Force -Path build\win | Out-Null

      - name: Package build into zip (non-Windows)
        if: matrix.platform != 'win'
        run: |
          set -e
          if [ -d "dist/${{ matrix.platform }}" ] && [ "$(ls -A dist/${{ matrix.platform }})" ]; then
            zip -r "dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip" "dist/${{ matrix.platform }}"
          elif [ -d "dist" ] && [ "$(ls -A dist)" ]; then
            zip -r "dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip" "dist"
          elif [ -d "build/${{ matrix.platform }}" ] && [ "$(ls -A build/${{ matrix.platform }})" ]; then
            zip -r "dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip" "build/${{ matrix.platform }}"
          elif [ -d "build" ] && [ "$(ls -A build)" ]; then
            zip -r "dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip" "build"
          else
            echo "ERROR: No build output found for platform '${{ matrix.platform }}' (checked dist/${{ matrix.platform }}, dist, build/${{ matrix.platform }}, build). Aborting." >&2
            exit 1
          fi

      - name: Package build into zip (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $dst = "dist\\hopkit-win-v${env:VERSION}.zip"
          $candidates = @("dist\\win","dist","build\\win","build")
          $selected = $null
          foreach ($c in $candidates) {
            if ((Test-Path $c -PathType Container) -and ((Get-ChildItem $c -Recurse | Measure-Object).Count -gt 0)) {
              $selected = $c
              break
            }
          }
          if (-not $selected) {
            Write-Error "ERROR: No build output found for Windows (checked: $($candidates -join ', ')). Aborting."
            exit 1
          } else {
            Compress-Archive -Path "$selected\\*" -DestinationPath $dst -Force
          }

      - name: Verify zip exists
        run: |
          ZIP="dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip"
          if [ "${{ matrix.platform }}" = "win" ]; then
            echo "Skipping bash zip existence check on non-bash runner"
          else
            if [ ! -f "$ZIP" ]; then
              echo "ERROR: expected zip $ZIP not found" >&2
              ls -la dist || true
              exit 1
            fi
          fi

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: hopkit-${{ matrix.platform }}
          path: |
            dist/hopkit-${{ matrix.platform }}-v${{ env.VERSION }}.zip

  publish:
    name: Create release and upload assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ always() }}
    steps:
      - name: Checkout (for version)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version (publish)
        id: get_version_publish
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Download Windows artifact (best-effort)
        id: download_win
        uses: actions/download-artifact@v4
        with:
          name: hopkit-win
          path: ./artifacts/hopkit-win
        continue-on-error: true

      - name: Download macOS artifact (best-effort)
        id: download_mac
        uses: actions/download-artifact@v4
        with:
          name: hopkit-mac
          path: ./artifacts/hopkit-mac
        continue-on-error: true

      - name: Download Linux artifact (best-effort)
        id: download_linux
        uses: actions/download-artifact@v4
        with:
          name: hopkit-linux
          path: ./artifacts/hopkit-linux
        continue-on-error: true

      - name: Collect downloaded artifacts
        id: collect
        run: |
          set -e
          VERSION=$(jq -r .version package.json)
          FOUND=0
          HAS_WIN=false
          HAS_MAC=false
          HAS_LINUX=false

          if [ -f "./artifacts/hopkit-win/hopkit-win-v${VERSION}.zip" ]; then
            FOUND=$((FOUND+1)); HAS_WIN=true
          fi
          if [ -f "./artifacts/hopkit-mac/hopkit-mac-v${VERSION}.zip" ]; then
            FOUND=$((FOUND+1)); HAS_MAC=true
          fi
          if [ -f "./artifacts/hopkit-linux/hopkit-linux-v${VERSION}.zip" ]; then
            FOUND=$((FOUND+1)); HAS_LINUX=true
          fi

          echo "found=$FOUND" >> $GITHUB_OUTPUT
          echo "has_win=$HAS_WIN" >> $GITHUB_OUTPUT
          echo "has_mac=$HAS_MAC" >> $GITHUB_OUTPUT
          echo "has_linux=$HAS_LINUX" >> $GITHUB_OUTPUT

          if [ "$FOUND" -eq 0 ]; then
            echo "No artifacts found from build. Skipping release."
            exit 0
          fi

      - name: Create GitHub release
        id: create_release
        if: ${{ fromJson(steps.collect.outputs.found) > 0 }}
        uses: actions/create-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          release_name: Hopkit v${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows build to release
        if: ${{ fromJson(steps.collect.outputs.has_win) == true && steps.create_release.outputs.upload_url != '' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/hopkit-win/hopkit-win-v${{ env.VERSION }}.zip
          asset_name: hopkit-win-v${{ env.VERSION }}.zip
          asset_content_type: application/zip

      - name: Upload macOS build to release
        if: ${{ fromJson(steps.collect.outputs.has_mac) == true && steps.create_release.outputs.upload_url != '' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/hopkit-mac/hopkit-mac-v${{ env.VERSION }}.zip
          asset_name: hopkit-mac-v${{ env.VERSION }}.zip
          asset_content_type: application/zip

      - name: Upload Linux build to release
        if: ${{ fromJson(steps.collect.outputs.has_linux) == true && steps.create_release.outputs.upload_url != '' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/hopkit-linux/hopkit-linux-v${{ env.VERSION }}.zip
          asset_name: hopkit-linux-v${{ env.VERSION }}.zip
          asset_content_type: application/zip
