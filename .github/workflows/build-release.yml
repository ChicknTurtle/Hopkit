name: Create Release

on:
  push:
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      build: ${{ steps.compare.outputs.build }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: get_version
        run: |
          VERSION=$(python3 -c 'import json;print(json.load(open("package.json"))["version"])')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - id: get_latest
        run: |
          TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("tag_name",""))')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - id: compare
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          TAG="${{ steps.get_latest.outputs.tag }}"
          if [ "v$VERSION" = "$TAG" ]; then
            echo "build=false" >> $GITHUB_OUTPUT
          else
            echo "build=true" >> $GITHUB_OUTPUT
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version
        id: meta
        run: |
          VERSION=$(python3 -c 'import json;print(json.load(open("package.json"))["version"])')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="v${VERSION}"
          COMMIT="${{ github.sha }}"

          if command -v gh >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target "$COMMIT" \
              --title "$TAG" \
              --notes "Source release $TAG" || true
          else
            curl -s -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"$TAG\",\"target_commitish\":\"$COMMIT\"}" \
              "https://api.github.com/repos/${{ github.repository }}/releases" || true
          fi